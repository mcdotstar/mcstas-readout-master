name: Wheels

on:
  pull_request:
  release:
    types: [created, edited, published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event.action == 'published' }}

jobs:
  source:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - run: pipx run build --sdist
      - run: pipx run twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*.tar.gz

  cibuildwheel:
    name: "Wheels for ${{ matrix.variant.platform }} on ${{ matrix.variant.os }}"
    runs-on: ${{ matrix.variant.os }}
    strategy:
      fail-fast: false
      matrix:
        variant:
          - { os: ubuntu-latest, platform: 'manylinux' }
          - { os: macos-15-intel, platform: 'macosx' }
          - { os: macos-15, platform: 'macosx' }
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: pypa/cibuildwheel@v3.1.4
        env:
          CIBW_BUILD: "*-${{ matrix.variant.platform }}*"
          MACOSX_DEPLOYMENT_TARGET: "14"
      - name: Verify clean directory
        run: git diff --exit-code
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.variant.os }}
          path: wheelhouse/*.whl

  publish:
    name: Publish to PyPI
    needs: [source, cibuildwheel]
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
